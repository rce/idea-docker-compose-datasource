name: Build

# Compiles, tests and packages the plugin on pushes to main and on pull requests.
# (The slow IDE-compatibility check runs in the Release workflow, not here.)
on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build, test and package
        run: ./gradlew build buildPlugin

      - name: Upload plugin distribution
        uses: actions/upload-artifact@v4
        with:
          name: plugin-distribution
          path: build/distributions/*.zip
          if-no-files-found: error
